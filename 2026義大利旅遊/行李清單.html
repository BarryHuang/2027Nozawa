<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>2026 義大利行李清單</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}

        /* NAV */
        nav{background:#134e4a;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
        .nav-brand{font-weight:700;font-size:18px;letter-spacing:1px}
        .nav-actions{display:flex;gap:8px}
        .nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;transition:.15s}
        .nav-btn:hover{background:rgba(255,255,255,.25)}
        .nav-btn.danger{background:rgba(239,68,68,.3)}
        .nav-btn.danger:hover{background:rgba(239,68,68,.5)}

        /* HERO */
        .hero{background:linear-gradient(135deg,#134e4a 0%,#0f766e 100%);color:#fff;padding:32px 24px 24px;text-align:center}
        .hero h1{font-size:26px;font-weight:700;margin-bottom:4px}
        .hero .subtitle{font-size:13px;opacity:.75;margin-bottom:20px}
        .overall-progress{background:rgba(0,0,0,.2);border-radius:999px;height:10px;max-width:400px;margin:0 auto 8px}
        .overall-bar{background:#5eead4;height:100%;border-radius:999px;transition:.3s}
        .overall-label{font-size:13px;opacity:.85}

        /* TOOLBAR */
        .toolbar{max-width:1100px;margin:20px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap}
        .tool-btn{background:#fff;border:1px solid #e2e8f0;color:#334155;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:.15s;display:flex;align-items:center;gap:6px}
        .tool-btn:hover{background:#f1f5f9;border-color:#cbd5e1}
        .tool-btn.primary{background:#0d9488;color:#fff;border-color:#0d9488}
        .tool-btn.primary:hover{background:#0f766e}

        /* GRID */
        .grid{max-width:1100px;margin:20px auto 60px;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

        /* CARD */
        .card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;display:flex;flex-direction:column}
        .card-header{padding:16px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f1f5f9}
        .card-icon{font-size:22px;line-height:1}
        .card-title{font-size:15px;font-weight:700;color:#0f766e;flex:1;cursor:pointer}
        .card-title:focus{outline:2px solid #0d9488;border-radius:4px;padding:0 2px}
        .card-badge{background:#f0fdf4;color:#166534;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
        .card-badge.done{background:#0d9488;color:#fff}
        .card-delete{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:2px 6px;border-radius:6px;line-height:1}
        .card-delete:hover{color:#ef4444;background:#fef2f2}

        /* ITEMS */
        .item-list{list-style:none;padding:8px 0;flex:1}
        .item{display:flex;align-items:center;gap:10px;padding:7px 18px;transition:.1s}
        .item:hover{background:#f8fafc}
        .item input[type=checkbox]{width:17px;height:17px;accent-color:#0d9488;cursor:pointer;flex-shrink:0}
        .item-label{flex:1;font-size:13.5px;line-height:1.4;cursor:pointer;transition:.2s}
        .item.checked .item-label{text-decoration:line-through;color:#94a3b8}
        .item-del{background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:15px;padding:2px 5px;border-radius:5px;opacity:0;transition:.15s;line-height:1}
        .item:hover .item-del{opacity:1}
        .item-del:hover{color:#ef4444;background:#fef2f2}

        /* NOTE tag */
        .item-note{font-size:11px;color:#64748b;display:block;margin-top:1px}

        /* ADD ITEM */
        .add-item-row{display:flex;gap:6px;padding:10px 14px 14px}
        .add-item-input{flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-family:inherit;font-size:13px;outline:none;transition:.15s}
        .add-item-input:focus{border-color:#0d9488;box-shadow:0 0 0 2px rgba(13,148,136,.15)}
        .add-item-btn{background:#0d9488;color:#fff;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:16px;line-height:1;transition:.15s}
        .add-item-btn:hover{background:#0f766e}

        /* ADD CATEGORY */
        .add-cat-card{background:transparent;border:2px dashed #cbd5e1;border-radius:14px;display:flex;align-items:center;justify-content:center;min-height:120px;cursor:pointer;color:#94a3b8;font-size:14px;font-weight:500;gap:8px;transition:.15s}
        .add-cat-card:hover{border-color:#0d9488;color:#0d9488;background:#f0fdfa}

        /* PRINT */
        @media print{
            nav,.toolbar,.add-item-row,.card-delete,.item-del,.add-cat-card,.nav-actions{display:none!important}
            body{background:#fff}
            .hero{background:#134e4a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
            .grid{grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
            .card{break-inside:avoid;box-shadow:none;border:1px solid #e2e8f0}
        }

        /* MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
        .modal{background:#fff;border-radius:14px;padding:28px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .modal h3{font-size:17px;font-weight:700;margin-bottom:8px;color:#0f766e}
        .modal p{font-size:13px;color:#64748b;margin-bottom:20px}
        .modal-input{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-family:inherit;font-size:14px;outline:none;margin-bottom:16px}
        .modal-input:focus{border-color:#0d9488}
        .modal-emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
        .emoji-btn{background:#f1f5f9;border:2px solid transparent;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:18px;transition:.1s}
        .emoji-btn.selected{border-color:#0d9488;background:#f0fdfa}
        .modal-actions{display:flex;gap:8px;justify-content:flex-end}
        .modal-cancel{background:#f1f5f9;border:none;color:#64748b;padding:9px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px}
        .modal-ok{background:#0d9488;border:none;color:#fff;padding:9px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
        .modal-ok:hover{background:#0f766e}

        @media(max-width:520px){
            .hero h1{font-size:20px}
            .grid{grid-template-columns:1fr;margin-bottom:40px}
            nav{padding:12px 16px}
        }
    </style>
</head>

// ─── STATE ─────────────────────────────────────────────
let data;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      data = JSON.parse(raw);
      // migrate: ensure every item has a note field
      data.categories.forEach(cat => cat.items.forEach(item => { if (!('note' in item)) item.note = ''; }));
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ─── RENDER ────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  data.categories.forEach(cat => grid.appendChild(buildCard(cat)));

  // add category button
  const addCard = document.createElement('div');
  addCard.className = 'add-cat-card';
  addCard.innerHTML = '＋ 新增分類';
  addCard.onclick = openAddCategoryModal;
  grid.appendChild(addCard);

  updateOverall();
}

function buildCard(cat) {
  const checked = cat.items.filter(i => i.checked).length;
  const total = cat.items.length;
  const done = total > 0 && checked === total;

  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'cat-' + cat.id;

  // header
  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${cat.icon}</span>
      <span class="card-title" contenteditable="true" onblur="renameCategory('${cat.id}', this)" title="點擊編輯名稱">${cat.name}</span>
      <span class="card-badge${done ? ' done' : ''}">${checked}/${total}</span>
      <button class="card-delete" title="刪除此分類" onclick="deleteCategory('${cat.id}')">✕</button>
    </div>
    <ul class="item-list" id="list-${cat.id}"></ul>
    <div class="add-item-row">
      <input class="add-item-input" id="input-${cat.id}" type="text" placeholder="新增項目…" maxlength="60"
        onkeydown="if(event.key==='Enter')addItem('${cat.id}')">
      <button class="add-item-btn" onclick="addItem('${cat.id}')">＋</button>
    </div>
  `;

  const list = card.querySelector('#list-' + cat.id);
  cat.items.forEach(item => list.appendChild(buildItem(cat.id, item)));
  return card;
}

function buildItem(catId, item) {
  const li = document.createElement('li');
  li.className = 'item' + (item.checked ? ' checked' : '');
  li.id = 'item-' + item.id;
  li.innerHTML = `
    <input type="checkbox" id="chk-${item.id}" ${item.checked ? 'checked' : ''}
      onchange="toggleItem('${catId}','${item.id}')">
    <label for="chk-${item.id}" class="item-label">
      ${item.text}
      ${item.note ? `<span class="item-note">📌 ${item.note}</span>` : ''}
    </label>
    <button class="item-del" title="刪除" onclick="deleteItem('${catId}','${item.id}')">✕</button>
  `;
  return li;
}

function updateOverall() {
  let totalItems = 0, checkedItems = 0;
  data.categories.forEach(cat => {
    totalItems += cat.items.length;
    checkedItems += cat.items.filter(i => i.checked).length;
  });
  const pct = totalItems > 0 ? Math.round(checkedItems / totalItems * 100) : 0;
  document.getElementById('overallBar').style.width = pct + '%';
  document.getElementById('overallLabel').textContent =
    `已確認 ${checkedItems} / ${totalItems} 項（${pct}%）`;
}

// ─── ACTIONS ───────────────────────────────────────────
function toggleItem(catId, itemId) {
  const cat = data.categories.find(c => c.id === catId);
  const item = cat.items.find(i => i.id === itemId);
  item.checked = !item.checked;
  saveData();
  // update just the item and badge
  const li = document.getElementById('item-' + itemId);
  li.className = 'item' + (item.checked ? ' checked' : '');
  const checked = cat.items.filter(i => i.checked).length;
  const total = cat.items.length;
  const badge = document.querySelector('#cat-' + catId + ' .card-badge');
  badge.textContent = checked + '/' + total;
  badge.className = 'card-badge' + (checked === total && total > 0 ? ' done' : '');
  updateOverall();
}

function addItem(catId) {
  const input = document.getElementById('input-' + catId);
  const text = input.value.trim();
  if (!text) return;
  const cat = data.categories.find(c => c.id === catId);
  const item = { id: catId + '_' + Date.now(), text, note: '', checked: false };
  cat.items.push(item);
  saveData();
  const list = document.getElementById('list-' + catId);
  list.appendChild(buildItem(catId, item));
  input.value = '';
  // update badge
  const badge = document.querySelector('#cat-' + catId + ' .card-badge');
  const checked = cat.items.filter(i => i.checked).length;
  badge.textContent = checked + '/' + cat.items.length;
  badge.className = 'card-badge';
  updateOverall();
}

function deleteItem(catId, itemId) {
  const cat = data.categories.find(c => c.id === catId);
  cat.items = cat.items.filter(i => i.id !== itemId);
  saveData();
  document.getElementById('item-' + itemId).remove();
  const checked = cat.items.filter(i => i.checked).length;
  const total = cat.items.length;
  const badge = document.querySelector('#cat-' + catId + ' .card-badge');
  badge.textContent = checked + '/' + total;
  badge.className = 'card-badge' + (checked === total && total > 0 ? ' done' : '');
  updateOverall();
}

function deleteCategory(catId) {
  const cat = data.categories.find(c => c.id === catId);
  if (!confirm(`確定要刪除「${cat.name}」整個分類？`)) return;
  data.categories = data.categories.filter(c => c.id !== catId);
  saveData();
  document.getElementById('cat-' + catId).remove();
  updateOverall();
}

function renameCategory(catId, el) {
  const cat = data.categories.find(c => c.id === catId);
  const newName = el.textContent.trim();
  if (newName) { cat.name = newName; saveData(); }
  else el.textContent = cat.name;
}

function checkAll() {
  data.categories.forEach(cat => cat.items.forEach(i => i.checked = true));
  saveData(); render();
}

function uncheckAll() {
  data.categories.forEach(cat => cat.items.forEach(i => i.checked = false));
  saveData(); render();
}

function confirmReset() {
  if (confirm('確定要重置所有項目（清除自訂內容並恢復預設清單）？')) {
    localStorage.removeItem(STORAGE_KEY);
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData(); render();
  }
}

// ─── MODAL ─────────────────────────────────────────────
let selectedEmoji = '📋';

function openAddCategoryModal() {
  selectedEmoji = '📋';
  document.getElementById('modalTitle').textContent = '新增分類';
  document.getElementById('modalDesc').textContent = '選擇圖示並輸入分類名稱';
  document.getElementById('modalInput').value = '';

  const row = document.getElementById('emojiRow');
  row.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => { selectedEmoji = e; row.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); };
    row.appendChild(btn);
  });

  document.getElementById('modalOk').onclick = doAddCategory;
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('modalInput').focus(), 50);
}

function doAddCategory() {
  const name = document.getElementById('modalInput').value.trim();
  if (!name) return;
  const id = 'cat_' + Date.now();
  data.categories.push({ id, name, icon: selectedEmoji, items: [] });
  saveData();
  closeModalDirect();
  render();
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').style.display = 'none'; }

document.getElementById('modalInput').addEventListener('keydown', e => { if (e.key === 'Enter') doAddCategory(); });

// ─── INIT ──────────────────────────────────────────────
loadData();
render();
</script>
</body>
</html>
